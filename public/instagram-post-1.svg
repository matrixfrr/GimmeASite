<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Orange Background -->
  <rect width="1080" height="1080" fill="#f97316"/>

  <!-- Container for centered logo and text -->
  <g transform="translate(540, 540)">
    <!-- Globe Logo (centered at -120 offset to leave room for text) -->
    <g transform="translate(-200, 0)">
      <!-- Logo background square with rounded corners -->
      <rect x="-50" y="-50" width="100" height="100" rx="20" fill="#0a0a0a"/>
      <!-- Globe icon -->
      <g fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <!-- Outer circle -->
        <circle cx="0" cy="0" r="30"/>
        <!-- Vertical ellipse -->
        <ellipse cx="0" cy="0" rx="12" ry="30"/>
        <!-- Horizontal lines -->
        <line x1="-30" y1="0" x2="30" y2="0"/>
        <path d="M -26 -15 Q 0 -20 26 -15"/>
        <path d="M -26 15 Q 0 20 26 15"/>
      </g>
    </g>

    <!-- GimmeASite Text -->
    <text x="30" y="18" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#0a0a0a" letter-spacing="-2">GimmeASite</text>
  </g>
</svg>
